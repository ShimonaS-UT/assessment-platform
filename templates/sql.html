<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Assessment</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    background: linear-gradient(135deg,#f0f4f8,#e6eef5);
    font-family: "Segoe UI", Arial, sans-serif;
}

.container{
  display:flex;
  margin-top:30px;
  gap:20px;
}

/* Table panel styling */
.table-container{
  width:40%;
  max-height:500px;
  overflow-y:auto;
  background:white;
  padding:15px;
  border-radius:5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Question panel styling */
.question-container{
  width:60%;
  background:white;
  padding:20px;
  border-radius:5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* SQL textarea */
textarea{
  width:100%;
  height:150px;
  font-family: monospace;
  font-size:14px;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* Result box */
#result-box{
  margin-top:10px;
  background:#f9f9f9;
  padding:15px;
  min-height:120px;
  border-radius:5px;
  border:1px solid #ddd;
  font-family: monospace;
  white-space: pre-wrap;
}

/* Timer */
#timer{
  font-size:18px;
  color:#db2828;
  font-weight:bold;
  margin-bottom:15px;
}

/* Navigation buttons */
#prev, #next, #execute, #validate, #submit {
    margin-right:8px;
    margin-top:10px;
}

h2.ui.header {
    margin-bottom:20px;
}

</style>
</head>

<body>
<div class="ui container">
    <h2 class="ui header">
        <i class="database icon"></i>
        <div class="content">SQL Assessment
            <div class="sub header">Write queries based on the Employee table</div>
        </div>
    </h2>

    <div id="timer"></div>

    <div class="container">
        <div class="table-container">
            <h4 class="ui dividing header">Employee Table</h4>
            <table class="ui celled table">
            <thead>
            <tr>
            {% for col in table_columns %}
            <th>{{ col }}</th>
            {% endfor %}
            </tr>
            </thead>
            <tbody>
            {% for row in table_rows %}
            <tr>
            {% for val in row %}
            <td>{{ val }}</td>
            {% endfor %}
            </tr>
            {% endfor %}
            </tbody>
            </table>
        </div>

        <div class="question-container">
            <div id="sql-question"></div>
            <textarea id="user-query" placeholder="Write SQL query here"></textarea>
            <br>
            <button id="prev" class="ui button"><i class="arrow left icon"></i> Previous</button>
            <button id="next" class="ui primary button">Next <i class="arrow right icon"></i></button>
            <button id="execute" class="ui green button"><i class="play icon"></i> Execute</button>
            <button id="validate" class="ui teal button"><i class="save icon"></i> Save Answer</button>
            <button id="submit" class="ui red button"><i class="check icon"></i> Submit Assessment</button>
            <div id="result-box"></div>
        </div>
    </div>
</div>

<script>
let questions = {{ questions|tojson }};
let saved_answers = {{ session.get('sql_answers',{})|tojson }};
let current = 0;
let time = 60*10; // 10 minutes
let examSubmitted = false;

/* ---------------- TIMER ---------------- */
function startTimer(){
  let timer = setInterval(function(){
    let minutes = Math.floor(time/60);
    let seconds = time % 60;
    $("#timer").text(`Time Left: ${minutes}:${seconds<10?'0':''}${seconds}`);
    time--;
    if(time<0){
      clearInterval(timer);
      submitSQL();
    }
  },1000);
}
startTimer();

/* ---------------- SHOW QUESTION ---------------- */
function showQuestion(index){
  let q = questions[index];
  $("#sql-question").html(`<h3>Q${index+1}: ${q.question}</h3>`);
  $("#user-query").val(saved_answers[q.id] || "");
  $("#result-box").html("");
  $("#prev").toggle(index>0);
  $("#next").toggle(index<questions.length-1);
  $("#validate").toggle(index==questions.length-1);
  $("#submit").toggle(index==questions.length-1);
}

/* ---------------- NAVIGATION ---------------- */
function navigate(offset){
  let q = questions[current];
  saved_answers[q.id] = $("#user-query").val();
  $.ajax({
    url:"{{ url_for('save_sql_answer') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify({id:q.id, query:saved_answers[q.id]})
  });

  current += offset;
  if(current<0) current=0;
  if(current>=questions.length) current=questions.length-1;
  showQuestion(current);
}

$("#next").click(function(){ navigate(1); });
$("#prev").click(function(){ navigate(-1); });

/* ---------------- EXECUTE ---------------- */
$("#execute").click(function(){
  let query = $("#user-query").val();
  $.ajax({
    url:"{{ url_for('run_sql') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify({query: query}),
    success:function(res){
      if(res.error){ alert(res.error); return; }
      let output="";
      res.output.forEach(row=>{ output += row.join(" | ") + "\n"; });
      $("#result-box").text(output);
    }
  });
});

/* ---------------- SAVE ---------------- */
$("#validate").click(function(){
  let qid = questions[current].id;
  saved_answers[qid] = $("#user-query").val();
  $.ajax({
    url:"{{ url_for('save_sql_answer') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify({id:qid, query:saved_answers[qid]}),
    success:function(){ alert("Answer Saved"); }
  });
});

/* ---------------- SUBMIT ---------------- */
function submitSQL(){
  examSubmitted = true;
  let q = questions[current];
  saved_answers[q.id] = $("#user-query").val();
  $.ajax({
    url:"{{ url_for('submit_sql') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify(saved_answers),
    success:function(res){
      alert("SQL assessment submitted");
      window.location="{{ url_for('dashboard') }}";
    },
    error:function(){
      alert("Error submitting SQL assessment. Redirecting...");
      window.location="{{ url_for('dashboard') }}";
    }
  });
}
$("#submit").click(submitSQL);

/* ---------------- TAB-SWITCH DETECTION ---------------- */
document.addEventListener("visibilitychange", function() {
    if (!examSubmitted && document.hidden) {
        alert("You switched tabs! Your assessment will be locked and score reset.");
       fetch("{{ url_for('tab_switch') }}", {
    method: "POST",
    credentials: "include"   // 🔥 REQUIRED FOR RENDER
})
.then(() => {
    window.location = "{{ url_for('dashboard') }}";
});
    }
});

/* ---------------- INITIAL ---------------- */
showQuestion(current);
</script>
</body>
</html>
