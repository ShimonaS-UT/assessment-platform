<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;">

<div class="ui raised very padded segment" style="width:400px;">
  <h3 class="ui header">Reset Password</h3>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="ui {{ 'negative' if category=='error' else 'positive' }} message">
        <p>{{ message }}</p>
      </div>
    {% endfor %}
  {% endwith %}

  <form class="ui form" method="POST">
    <div class="field">
      <label>Email</label>
      <input type="email" name="username" required>
    </div>

    <div class="field">
      <label>New Password</label>
      <input type="password" name="password" required>
    </div>

    <button class="ui blue button fluid">Reset Password</button>
  </form>

  <div style="margin-top:10px;">
    <a href="{{ url_for('login') }}">Back to Login</a>
  </div>
</div>

</body>
</html>
