<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCQ Assessment</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
    background: linear-gradient(135deg,#f5f7fa,#e4ecf5);
    font-family:"Segoe UI", Arial, sans-serif;
}

.container{
    margin-top:40px;
}

/* assessment card */
.assessment-card{
    padding:30px;
}

/* timer styling */
#timer{
    font-size:20px;
    color:#db2828;
    font-weight:bold;
    margin-bottom:20px;
}

/* question spacing */
#question-container{
    margin-top:20px;
}

/* options spacing */
.option{
    display:block;
    margin:12px 0;
}

/* navigation buttons */
.navigation{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
}

</style>

</head>

<body>

<div class="ui container">

<div class="ui raised segment assessment-card">

<h2 class="ui header">
<i class="question circle icon"></i>
<div class="content">
MCQ Assessment
<div class="sub header">Answer the following questions</div>
</div>
</h2>

<div id="timer"></div>

<div id="question-container"></div>

<div class="navigation">

<button id="prev" class="ui button">
<i class="arrow left icon"></i>
Previous
</button>

<button id="next" class="ui primary button">
Next
<i class="arrow right icon"></i>
</button>

<button id="submit" class="ui red button">
<i class="check icon"></i>
Submit
</button>

</div>

</div>

</div>

<script>

let questions = {{ questions|tojson }};
let saved_answers = {{ saved_answers|tojson }};
let current = 0;
let time = 60;
let examSubmitted = false;

/* ---------------- TIMER ---------------- */

function startTimer(){

    let timer = setInterval(function(){

        let minutes = Math.floor(time/60);
        let seconds = time % 60;

        document.getElementById("timer").innerHTML =
        "Time Left : " + minutes + ":" + (seconds<10?"0":"")+seconds;

        time--;

        if(time < 0){

            clearInterval(timer);

            submitTest();

        }

    },1000);

}

startTimer();

/* ---------------- AUTO SAVE ---------------- */

function saveAnswer(qid,value){

    saved_answers[qid] = value;

    $.ajax({

        url:"{{ url_for('save_mcq') }}",

        type:"POST",

        contentType:"application/json",

        data:JSON.stringify({[qid]:value}),

        success:function(){

            console.log("Answer saved for question " + qid);

        }

    });

}

/* ---------------- SHOW QUESTION ---------------- */

function showQuestion(index){

    let q = questions[index];

    let html = `<h3>Q${index+1}: ${q.question}</h3>`;

    html += `<div class="ui form">`;

    q.options.forEach(opt=>{

        let checked = saved_answers[q.id] == opt ? "checked" : "";

        html += `
        <div class="field option">
            <div class="ui radio checkbox">
                <input type="radio" name="q${q.id}" value="${opt}" ${checked}>
                <label>${opt}</label>
            </div>
        </div>`;

    });

    html += `</div>`;

    $("#question-container").html(html);

    $('.ui.radio.checkbox').checkbox();

    $('input[type=radio]').off('change').on('change',function(){

        saveAnswer(q.id,$(this).val());

    });

    $("#prev").toggle(index > 0);

    $("#next").toggle(index < questions.length - 1);

    $("#submit").toggle(index === questions.length - 1);

}

/* ---------------- NAVIGATION ---------------- */

function navigate(offset){

    let q = questions[current];

    let selected = $(`input[name=q${q.id}]:checked`).val();

    if(selected) saveAnswer(q.id,selected);

    current += offset;

    if(current < 0) current = 0;

    if(current >= questions.length) current = questions.length - 1;

    showQuestion(current);

}

$("#next").click(function(){ navigate(1); });

$("#prev").click(function(){ navigate(-1); });

/* ---------------- SUBMIT ---------------- */

function submitTest(){

    examSubmitted = true;

    let q = questions[current];

    let selected = $(`input[name=q${q.id}]:checked`).val();

    if(selected) saveAnswer(q.id,selected);

    $.ajax({

        url:"{{ url_for('submit_mcq') }}",

        type:"POST",

        contentType:"application/json",

        data:JSON.stringify(saved_answers),

        success:function(res){

            alert("MCQ Submitted!");

            window.location="{{ url_for('dashboard') }}";

        },

        error:function(){

            alert("Error submitting MCQ. Redirecting to dashboard.");

            window.location="{{ url_for('dashboard') }}";

        }

    });

}

$("#submit").click(submitTest);

/* ---------------- TAB SWITCH DETECTION ---------------- */

document.addEventListener("visibilitychange",function(){

    if(!examSubmitted && document.hidden){

        alert("You switched tabs! Your assessment will be locked and score reset.");

        fetch("{{ url_for('tab_switch') }}", {
    method: "POST",
    credentials: "include"   // 🔥 REQUIRED FOR RENDER
})
.then(() => {
    window.location = "{{ url_for('dashboard') }}";
});

    }

});

/* ---------------- INITIAL LOAD ---------------- */

showQuestion(current);

</script>

</body>
</html>
