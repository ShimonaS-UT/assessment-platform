<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coding Assessment</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    background: linear-gradient(135deg,#eef2f6,#dbe9f4);
    font-family: "Segoe UI", Arial, sans-serif;
}

.container {
    margin-top:30px;
}

textarea, input[type=text] {
    width:100%;
    font-family: monospace;
    font-size:14px;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

textarea {
    height:220px;
}

#output-area{
    background:#1b1c1d;
    color:#00ff00;
    padding:15px;
    min-height:120px;
    border-radius:5px;
    border:1px solid #333;
    font-family: monospace;
    white-space: pre-wrap;
    overflow-x:auto;
}

#timer{
    font-size:18px;
    color:#db2828;
    font-weight:bold;
    margin-bottom:15px;
}

.navigation button {
    margin-right:8px;
    margin-top:10px;
}

h2.ui.header {
    margin-bottom:20px;
}

</style>
</head>

<body>
<div class="ui container">
    <h2 class="ui header">
        <i class="code icon"></i>
        <div class="content">Coding Assessment
            <div class="sub header">Solve the programming problems below</div>
        </div>
    </h2>

    <div id="timer"></div>

    <div id="coding-question"></div>

    <label>Input (stdin)</label>
    <input type="text" id="input-data" placeholder="Enter input for program">

    <textarea id="code-area"></textarea>

    <div class="navigation">
        <button id="prev" class="ui button"><i class="arrow left icon"></i> Previous</button>
        <button id="next" class="ui primary button">Next <i class="arrow right icon"></i></button>
        <button id="save" class="ui green button"><i class="save icon"></i> Save</button>
        <button id="run" class="ui teal button"><i class="play icon"></i> Run</button>
        <button id="submit" class="ui red button"><i class="check icon"></i> Submit</button>
    </div>

    <h4>Output</h4>
    <pre id="output-area"></pre>
</div>

<script>
let questions = {{ questions|tojson }};
let saved = {{ saved_answers|tojson }};
let current = 0;
let time = 60*15; // 15 minutes
let examSubmitted = false; // track normal submission

/* ---------------- TIMER ---------------- */
function startTimer(){
  let timer = setInterval(function(){
    let minutes = Math.floor(time/60);
    let seconds = time%60;
    $("#timer").text(`Time Left: ${minutes}:${seconds<10?'0':''}${seconds}`);
    time--;
    if(time < 0){
      clearInterval(timer);
      submitCode(); // auto-submit
    }
  },1000);
}
startTimer();

/* ---------------- SHOW QUESTION ---------------- */
function showQuestion(index){
  let q = questions[index];
  $("#coding-question").html(`<h3>Q${index+1}: ${q.question}</h3>`);
  $("#code-area").val(saved[q.id] || "# Write your Python code here");
  $("#input-data").val(saved[q.id+"_input"] || "");

  $("#prev").toggle(index>0);
  $("#next").toggle(index<questions.length-1);
  $("#save").toggle(index==questions.length-1);
  $("#submit").toggle(index==questions.length-1);
}

/* ---------------- NAVIGATION ---------------- */
function navigate(offset){
  let q = questions[current];
  saved[q.id] = $("#code-area").val();
  saved[q.id+"_input"] = $("#input-data").val();
  $.ajax({
    url:"{{ url_for('save_code') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify({id:q.id, code:saved[q.id], input:saved[q.id+"_input"]})
  });

  current += offset;
  if(current<0) current=0;
  if(current>=questions.length) current=questions.length-1;
  showQuestion(current);
}
$("#next").click(function(){ navigate(1); });
$("#prev").click(function(){ navigate(-1); });

/* ---------------- RUN CODE ---------------- */
$("#run").click(function(){
  $.ajax({
    url:"{{ url_for('run_code') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify({code: $("#code-area").val(), input: $("#input-data").val()}),
    success:function(res){
      $("#output-area").text(res.output);
    },
    error:function(){ alert("Error running code"); }
  });
});

/* ---------------- SAVE ---------------- */
$("#save").click(function(){
  let q = questions[current];
  saved[q.id] = $("#code-area").val();
  saved[q.id+"_input"] = $("#input-data").val();
  $.ajax({
    url:"{{ url_for('save_code') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify({id:q.id, code:saved[q.id], input:saved[q.id+"_input"]}),
    success:function(){ alert("Code Saved"); }
  });
});

/* ---------------- SUBMIT ---------------- */
function submitCode(){
  examSubmitted = true; // mark as normal submission
  let q = questions[current];
  saved[q.id] = $("#code-area").val();
  saved[q.id+"_input"] = $("#input-data").val();

  $.ajax({
    url:"{{ url_for('submit_coding') }}",
    type:"POST",
    contentType:"application/json",
    data: JSON.stringify(saved),
    success:function(){ window.location="{{ url_for('dashboard') }}"; },
    error:function(){ window.location="{{ url_for('dashboard') }}"; }
  });
}
$("#submit").click(submitCode);

/* ---------------- TAB-SWITCH DETECTION ---------------- */
document.addEventListener("visibilitychange", function() {
    if (!examSubmitted && document.hidden) {
        alert("You switched tabs! Your assessment will be locked and score reset.");
        fetch("{{ url_for('tab_switch') }}", {
    method: "POST",
    credentials: "include"   // 🔥 REQUIRED FOR RENDER
})
.then(() => {
    window.location = "{{ url_for('dashboard') }}";
});
    }
});

/* ---------------- INITIAL LOAD ---------------- */
showQuestion(current);
</script>
</body>
</html>
